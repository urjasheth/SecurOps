name: "🛡️ SecurOps Approach C (Hybrid Tier)"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  security-scans:
    name: "Native Security Scans"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SECRET SCANNING (TruffleHog - Verified)
      - name: "🔐 Secret Scan (TruffleHog)"
        uses: trufflesecurity/trufflehog@v3.63.11
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified --json
        continue-on-error: true

      # 2. SAST SCANNING (Semgrep - Hybrid Rules)
      - name: "🔍 SAST Scan (Semgrep)"
        uses: returntocorp/semgrep-action@v1
        with:
          config: securops-config-approch-c/semgrep-hybrid.yml
          generateSarif: "1"
        continue-on-error: true

      - name: Rename Semgrep SARIF
        run: mv sgrep.sarif semgrep.sarif 2>/dev/null || true

      # 3. DEPENDENCY SCANNING (Trivy)
      - name: "🛡️ Dependency Scan (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # 4. REPORTING & UPLOADS
      - name: "📤 Upload SARIF to Security Tab"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .
          category: securops-hybrid

      - name: "📦 Archive Security Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: securops-hybrid-reports
          path: |
            *.sarif
            semgrep.json
            trufflehog.json
          if-no-files-found: ignore
