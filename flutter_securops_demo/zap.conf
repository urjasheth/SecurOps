# zap.conf
# This file tells ZAP which alerts to ignore or fail on.
# Format: <rule_id> | <action> | <name>
# Actions: IGNORE, INFO, LOW, MEDIUM, HIGH

# Ignore "Timestamp Disclosure" (often a false positive/low risk)
10096 | IGNORE | Timestamp Disclosure - Unix

# Ignore "X-Content-Type-Options Header Missing" for now (low risk)
10021 | IGNORE | X-Content-Type-Options Header Missing

# Focus on SQL Injection (High)
40018 | HIGH | SQL Injection
# Focus on Cross-Site Scripting (High)
40012 | HIGH | Cross-Site Scripting (Reflected)
# Focus on Sensitive Information Leak (High)
10027 | HIGH | Information Disclosure - Suspicious Comments
